services:
  postgres:
    image: postgres:15
    container_name: retailer_postgres
    restart: always
    environment:
      POSTGRES_USER: postgres
      POSTGRES_PASSWORD: postgres
      POSTGRES_DB: retailer_db
    ports:
      - "5433:5432"
    volumes:
      - postgres_data:/var/lib/postgresql/data

  redis:
    image: redis:7
    container_name: retailer_redis
    restart: always
    ports:
      - "6379:6379"

  api:
    build: .
    ports:
      - "5002:5001"
    depends_on:
      - postgres
      - redis
    environment:
      PORT: 5001
      DATABASE_URL: postgresql://postgres:postgres@postgres:5432/retailer_db
      REDIS_URL: redis://redis:6379
      JWT_SECRET: supersecretkey

volumes:
  postgres_data:
